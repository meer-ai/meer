name: Release

# Triggered by pushing a version tag (scripts/release.sh does this), or
# manually with a tag for recovery. Publishes all six packages to npm in
# dependency order with provenance, then cuts a GitHub Release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build & publish (e.g. v0.6.39)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write # create the GitHub Release
      id-token: write # OIDC for npm provenance
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0 # full history for release notes
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version (lockstep guard)
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "$RELEASE_TAG" ]; then
            echo "::error::Tag $RELEASE_TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Releasing $RELEASE_TAG"

      - name: Build
        run: pnpm run build

      - name: Typecheck
        run: pnpm run check

      - name: Test
        run: pnpm test

      - name: Publish all packages to npm (provenance)
        run: node scripts/publish.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          CI: 'true'

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists — skipping."
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi
